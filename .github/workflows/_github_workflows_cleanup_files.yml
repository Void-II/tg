name: Cleanup Downloaded Files

on:
  workflow_dispatch:
    inputs:
      keep_profile_pics:
        description: 'Keep profile pictures (only delete other downloaded files)'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography

      - name: Run cleanup
        env:
          DATA_KEY:           ${{ secrets.DATA_ENCRYPTION_KEY }}
          UI_ENCRYPTION_KEY:  ${{ secrets.UI_ENCRYPTION_KEY }}
          KEEP_PROFILE_PICS:  ${{ github.event.inputs.keep_profile_pics || 'true' }}
        run: python src/cleanup_files.py

      - name: Commit removed files
        run: |
          git config user.name  "tg-relay[bot]"
          git config user.email "tg-relay[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: cleanup downloaded files [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
          git push
